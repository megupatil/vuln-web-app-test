ignore:

  ##########################################################################
  # GLOBAL IGNORE RULES
  ##########################################################################

  # Ignore all findings of all types for test directories
  ALL:
    /test/**/*: {}
    /**/*.test.js:
      reason: "Test files are not part of production runtime"


  ##########################################################################
  # VULNERABILITY FINDINGS (Dependencies / OS / Packages)
  ##########################################################################

  vulnerabilities:
    ALL:

      # Ignore all vulnerabilities in legacy service (accepted risk)
      /apps/legacy-service/**/*:
        reason: "Legacy service - planned decommission, risk accepted"

      # Ignore uploads directory (user-generated content, not code-owned)
      /uploads/**/*:
        reason: "User-uploaded files - excluded from code scanning scope"


  ##########################################################################
  # SAST FINDINGS (Code-level issues)
  ##########################################################################

  sast:

    ######################################################################
    # Specific rule ignores (fine-grained control)
    ######################################################################

    WS-JS-001-SQL-INJECTION:
      /apps/legacy-service/**/*:
        reason: BY_DESIGN
        expires: 2026-12-01T00:00:00Z

    WS-JS-002-CMD-INJECTION:
      /apps/legacy-service/vulnerable.js:
        reason: BY_DESIGN
        expires: 2026-12-01T00:00:00Z

    WS-JS-003-HARDCODED-SECRET:
      /config/db.js:
        reason: "Temporary for demo - will be moved to secrets manager"
        expires: 2026-09-01T00:00:00Z


    ######################################################################
    # Broad ignores (scoped carefully)
    ######################################################################

    ALL:

      # Ignore entire legacy codebase
      /apps/legacy-service/**/*:
        reason: "Legacy insecure patterns accepted temporarily"

      # Ignore file upload utility (intentional vuln for testing)
      /utils/fileUpload.js:
        reason: "File upload intentionally vulnerable for testing scenarios"

      ####################################################################
      # IMPORTANT: DO NOT ignore config/secrets/**
      ####################################################################
      # This ensures nested secrets like:
      # config/secrets/nested/keys.js
      # are ALWAYS scanned and detected


  ##########################################################################
  # SECRETS SCANNING (Explicit control - NEW)
  ##########################################################################

  secrets:

    ######################################################################
    # Explicit exclusions (only where safe)
    ######################################################################

    ALL:

      # Ignore secrets in test files only
      /test/**/*:
        reason: "Test files may contain dummy credentials"

      ####################################################################
      # DO NOT IGNORE REAL SECRETS PATHS
      ####################################################################
      # Intentionally NOT ignoring:
      # /config/secrets/**
      # so that nested secrets are detected


  ##########################################################################
  # IaC FINDINGS (Terraform, Docker, etc.)
  ##########################################################################

  iac:

    2e35fea5-91d3-4a9b-b483-1b786827b170:
      /docker/Dockerfile:
        reason: BY_DESIGN

    ALL:

      # Ignore experimental infra if added later
      /infra/experimental/**/*:
        reason: "Experimental infrastructure - not production"


  ##########################################################################
  # VALIDATION NOTES (for your testing)
  ##########################################################################

  # EXPECTED BEHAVIOR:
  #
  # ✔ test/unit/.../*.test.js                → Ignored
  # ✔ apps/legacy-service/...               → Ignored
  # ✔ uploads/...                           → Ignored
  #
  # ✔ config/db.js                          → Ignored (specific rule)
  #
  # ❗ config/secrets/nested/keys.js        → SHOULD BE DETECTED
  # ❗ services/internal/...                 → SHOULD BE DETECTED
  #
